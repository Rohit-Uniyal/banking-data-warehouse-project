version: '3.9'

services:

  postgres:

    image: postgres:17

    container_name: postgres-compose

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: banking_dw

    ports:
      - "5434:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:

  postgres-data: